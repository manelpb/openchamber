name: docker-publish
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (tag) to build and publish
        required: true
        default: v1.13.2
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Patch Dockerfile for fork compatibility
        run: |
          # The upstream lockfile may be generated by a newer bun than the
          # pinned oven/bun image in the Dockerfile. Remove --frozen-lockfile
          # so the build succeeds regardless of minor lockfile format drift.
          sed -i 's/--frozen-lockfile//g' Dockerfile
          # Copy the full build context into the deps stage before `bun install`
          # so any patch dir referenced by package.json patchedDependencies
          # (patches/, bun-patches/, or a future name upstream adds) is present.
          # Enumerating individual patch dirs is brittle — upstream changing the
          # layout silently breaks the build. .dockerignore keeps this copy lean.
          sed -i '/RUN bun install/i COPY . .' Dockerfile
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/manelpb/openchamber:${{ inputs.ref }}
